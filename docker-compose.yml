services:
  postgres:
    image: postgres:15-alpine
    container_name: hl-markets-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hl_gov
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: hl_gov
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hl_gov -d hl_gov']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
